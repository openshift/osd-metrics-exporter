---
# Cleanup job to remove the old namespace after successful PKO deployment
# The namespace was renamed from openshift-osd-metrics-exporter to openshift-osd-metrics
#
# TRACKING CLUSTERS REQUIRING MANUAL CLEANUP:
# This job creates a ConfigMap 'old-namespace-cleanup-status' to track cleanup status:
#   - Label 'cleanup-status=manual-required' indicates manual cleanup needed
#   - Label 'cleanup-status=completed' indicates successful automatic cleanup
#
# To find clusters requiring manual intervention across your fleet:
#   oc get configmap old-namespace-cleanup-status -n openshift-osd-metrics \
#     -l cleanup-status=manual-required --all-namespaces
#
# The ConfigMap contains:
#   - workload-count: Number of resources blocking deletion
#   - timestamp: When the cleanup was attempted
#   - message: Description of the issue
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cleanup-old-namespace
  namespace: openshift-osd-metrics
  annotations:
    package-operator.run/phase: post-deploy-cleanup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: osd-metrics-exporter-namespace-cleanup
  annotations:
    package-operator.run/phase: post-deploy-cleanup
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "update", "patch", "get"]
    resourceNames: ["old-namespace-cleanup-status"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: osd-metrics-exporter-namespace-cleanup
  annotations:
    package-operator.run/phase: post-deploy-cleanup
roleRef:
  kind: ClusterRole
  name: osd-metrics-exporter-namespace-cleanup
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: cleanup-old-namespace
    namespace: openshift-osd-metrics
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cleanup-old-namespace
  namespace: openshift-osd-metrics
  annotations:
    package-operator.run/phase: post-deploy-cleanup
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: cleanup-old-namespace
      restartPolicy: OnFailure
      containers:
      - name: cleanup
        image: quay.io/openshift/origin-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          
          OLD_NS="openshift-osd-metrics-exporter"
          
          echo "Checking if old namespace exists: $OLD_NS"
          
          if ! oc get namespace "$OLD_NS" &>/dev/null; then
            echo "Old namespace $OLD_NS does not exist, nothing to clean up"
            exit 0
          fi
          
          echo "Old namespace found, checking if it's empty..."
          
          # Check if namespace has any workload resources
          WORKLOADS=$(oc get all -n "$OLD_NS" --no-headers 2>/dev/null | wc -l)

          if [ "$WORKLOADS" -gt 0 ]; then
            echo "WARNING: Old namespace $OLD_NS is not empty (has $WORKLOADS resources)"
            echo "Listing resources in the old namespace:"
            oc get all -n "$OLD_NS" || true

            # Create a ConfigMap to track manual cleanup requirement
            echo "Creating tracking ConfigMap for manual cleanup..."
            cat <<EOF | oc apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: old-namespace-cleanup-status
            namespace: openshift-osd-metrics
            labels:
              cleanup-status: "manual-required"
          data:
            status: "manual-cleanup-required"
            old-namespace: "$OLD_NS"
            workload-count: "$WORKLOADS"
            timestamp: "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            message: "Old namespace has workloads preventing automatic deletion. Manual intervention required."
          EOF

            echo "MANUAL CLEANUP REQUIRED: Check ConfigMap 'old-namespace-cleanup-status' in openshift-osd-metrics namespace"
            echo "To find affected clusters, query for ConfigMaps with label 'cleanup-status=manual-required'"
            exit 0
          fi

          echo "Old namespace $OLD_NS is empty, safe to delete"
          oc delete namespace "$OLD_NS"

          # Create success ConfigMap
          cat <<EOF | oc apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: old-namespace-cleanup-status
            namespace: openshift-osd-metrics
            labels:
              cleanup-status: "completed"
          data:
            status: "completed"
            old-namespace: "$OLD_NS"
            timestamp: "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            message: "Old namespace successfully deleted."
          EOF

          echo "Successfully deleted old namespace $OLD_NS"
