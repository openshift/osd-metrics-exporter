---
apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    package-operator.run/phase: cleanup-rbac
  name: olm-cleanup
  namespace: openshift-osd-metrics
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  annotations:
    package-operator.run/phase: cleanup-rbac
  name: olm-cleanup
  namespace: openshift-osd-metrics
rules:
- apiGroups:
  - operators.coreos.com
  resources:
  - clusterserviceversions
  - subscriptions
  - catalogsources
  - operatorgroups
  verbs:
  - get
  - list
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  annotations:
    package-operator.run/phase: cleanup-rbac
  name: olm-cleanup
  namespace: openshift-osd-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: olm-cleanup
subjects:
- kind: ServiceAccount
  name: olm-cleanup
  namespace: openshift-osd-metrics
---
apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    package-operator.run/phase: cleanup-deploy
    package-operator.run/collision-protection: IfNoController
  name: olm-cleanup
  namespace: openshift-osd-metrics
spec:
  template:
    metadata:
      labels:
        app: olm-cleanup
    spec:
      serviceAccountName: olm-cleanup
      restartPolicy: Never
      priorityClassName: openshift-user-critical
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: cleanup
        image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
        command:
        - /bin/bash
        - -c
        - |
          #!/bin/bash
          set -e

          # Delete ClusterServiceVersion(s) for osd-metrics-exporter
          echo "Deleting CSV for osd-metrics-exporter..."
          oc -n openshift-osd-metrics delete csv -l "operators.coreos.com/osd-metrics-exporter.openshift-osd-metrics" || true

          # Delete Subscription
          echo "Deleting Subscription for osd-metrics-exporter..."
          oc -n openshift-osd-metrics delete subscription.operators.coreos.com osd-metrics-exporter || true

          # Delete CatalogSource
          echo "Deleting CatalogSource for osd-metrics-exporter..."
          oc -n openshift-osd-metrics delete catalogsource.operators.coreos.com osd-metrics-exporter-registry || true

          # Delete OperatorGroup
          echo "Deleting OperatorGroup for osd-metrics-exporter..."
          oc -n openshift-osd-metrics delete operatorgroup.operators.coreos.com osd-metrics-exporter || true

          echo "OLM cleanup complete"
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
      ttlSecondsAfterFinished: 100
